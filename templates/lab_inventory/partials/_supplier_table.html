<table style="width: 100%; border-collapse: collapse;">
    <thead><tr><th scope="col" class="th-base">Nombre</th><th scope="col" class="th-base">RIF</th><th scope="col" class="th-base">Contacto</th><th scope="col" class="th-base text-center">Acciones</th></tr></thead>
    <tbody>
        {% for s in suppliers %}
        <tr>
            <td class="td-base" style="font-weight: 500;">{{ s.name }}</td>
            <td class="td-base" style="font-family: var(--font-mono); color: var(--text-secondary);">{{ s.rif|default:'—' }}</td>
            <td class="td-base" style="color: var(--text-secondary);">{{ s.contact_name|default:'—' }}</td>
            <td class="td-base text-center">
                <a href="{% url 'lab_inventory:supplier_update' s.pk %}" class="btn-table btn-table-edit">Editar</a>
                <a href="{% url 'lab_inventory:supplier_delete' s.pk %}" class="btn-table btn-table-delete">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="td-base text-center" style="padding: 3rem;">No hay proveedores.</td></tr>
        {% endfor %}
    </tbody>
</table>
