<!-- Modal genérico para formularios de catálogo -->
<div class="card" style="max-width: 480px;">
    <form method="post" hx-post="{{ request.path }}">
        {% csrf_token %}
        <h3 style="font-family: var(--font-display); font-size: var(--text-lg); font-weight: 600; color: var(--text-primary); margin-bottom: 1rem;">
            {{ title|default:'Formulario' }}
        </h3>

        {% for field in form %}
        <div style="margin-bottom: 0.75rem;">
            <label for="{{ field.id_for_label }}" class="label-base">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="form-error" role="alert">{{ field.errors|join:', ' }}</p>{% endif %}
        </div>
        {% endfor %}

        <div class="flex items-center gap-3" style="margin-top: 1rem;" x-data>
            <button type="submit" class="btn-primary">Guardar</button>
            <button type="button" @click="history.back()" class="btn-ghost">Cancelar</button>
        </div>
    </form>
</div>
