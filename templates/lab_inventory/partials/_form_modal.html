<!-- Modal genérico para formularios de catálogo -->
<form method="post" hx-post="{{ request.path }}" hx-target="#main-content" hx-swap="innerHTML">
    {% csrf_token %}
    <h3 style="font-family: var(--font-display); font-size: var(--text-lg); font-weight: 600; color: var(--text-primary); margin-bottom: 1rem;">
        {{ title|default:'Formulario' }}
    </h3>

    {% for field in form %}
    <div style="margin-bottom: 0.75rem;">
        <label for="{{ field.id_for_label }}" style="display: block; font-size: var(--text-sm); font-weight: 500; color: var(--text-primary); margin-bottom: 2px;">
            {{ field.label }}
        </label>
        {{ field }}
        {% if field.errors %}
            <p style="color: var(--color-error-600); font-size: var(--text-xs); margin-top: 2px;">{{ field.errors|join:', ' }}</p>
        {% endif %}
    </div>
    {% endfor %}

    <div class="flex gap-3" style="margin-top: 1rem;">
        <button type="submit"
                style="background: var(--color-primary-600); color: #fff; border: none; padding: 0.5rem 1.25rem; border-radius: var(--radius-md); font-size: var(--text-sm); cursor: pointer;">
            Guardar
        </button>
        <button type="button" onclick="history.back()"
                style="border: 1px solid var(--border-default); color: var(--text-secondary); padding: 0.5rem 1.25rem; border-radius: var(--radius-md); font-size: var(--text-sm); background: none; cursor: pointer;">
            Cancelar
        </button>
    </div>
</form>
