<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th class="th-base">Código</th>
            <th class="th-base">Nombre</th>
            <th class="th-base">Rendimiento</th>
            <th class="th-base text-center">Ítems</th>
            <th class="th-base text-center">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for r in reagents %}
        <tr>
            <td class="td-base" style="font-family: var(--font-mono); color: var(--text-secondary);">{{ r.code|default:'—' }}</td>
            <td class="td-base">
                <a href="{% url 'lab_inventory:reagent_detail' r.pk %}" style="color: var(--color-primary-600); font-weight: 500; text-decoration: none;">{{ r.name }}</a>
            </td>
            <td class="td-base" style="color: var(--text-secondary);">{{ r.yield_quantity }} {{ r.yield_unit.abbreviation }}</td>
            <td class="td-base text-center" style="color: var(--text-secondary);">{{ r.items.count }}</td>
            <td class="td-base text-center">
                <a href="{% url 'lab_inventory:reagent_update' r.pk %}" style="color: var(--color-primary-600); font-size: var(--text-xs); margin-right: 0.5rem; text-decoration: none;">Editar</a>
                <a href="{% url 'lab_inventory:reagent_delete' r.pk %}" style="color: var(--color-danger); font-size: var(--text-xs); text-decoration: none;">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="td-base text-center" style="padding: 3rem;">No hay reactivos registrados.</td></tr>
        {% endfor %}
    </tbody>
</table>
