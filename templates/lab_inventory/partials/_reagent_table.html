<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr style="border-bottom: 2px solid var(--border-default); background: var(--surface-body);">
            <th style="text-align: left; padding: 0.75rem 1rem; font-size: var(--text-xs); color: var(--text-secondary); font-weight: 600;">Código</th>
            <th style="text-align: left; padding: 0.75rem 1rem; font-size: var(--text-xs); color: var(--text-secondary); font-weight: 600;">Nombre</th>
            <th style="text-align: left; padding: 0.75rem 1rem; font-size: var(--text-xs); color: var(--text-secondary); font-weight: 600;">Rendimiento</th>
            <th style="text-align: center; padding: 0.75rem 1rem; font-size: var(--text-xs); color: var(--text-secondary); font-weight: 600;">Ítems</th>
            <th style="text-align: center; padding: 0.75rem 1rem; font-size: var(--text-xs); color: var(--text-secondary); font-weight: 600;">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for r in reagents %}
        <tr style="border-bottom: 1px solid var(--border-default);">
            <td style="padding: 0.75rem 1rem; font-size: var(--text-sm); color: var(--text-secondary); font-family: var(--font-mono);">
                {{ r.code|default:'—' }}
            </td>
            <td style="padding: 0.75rem 1rem;">
                <a href="{% url 'lab_inventory:reagent_detail' r.pk %}" style="color: var(--color-primary-600); font-size: var(--text-sm); font-weight: 500; text-decoration: none;">
                    {{ r.name }}
                </a>
            </td>
            <td style="padding: 0.75rem 1rem; font-size: var(--text-sm); color: var(--text-secondary);">
                {{ r.yield_quantity }} {{ r.yield_unit.abbreviation }}
            </td>
            <td style="text-align: center; padding: 0.75rem 1rem; font-size: var(--text-sm); color: var(--text-secondary);">
                {{ r.items.count }}
            </td>
            <td style="text-align: center; padding: 0.75rem 1rem;">
                <a href="{% url 'lab_inventory:reagent_update' r.pk %}" style="color: var(--color-primary-600); font-size: var(--text-xs); margin-right: 8px; text-decoration: none;">Editar</a>
                <a href="{% url 'lab_inventory:reagent_delete' r.pk %}" style="color: var(--color-error-600); font-size: var(--text-xs); text-decoration: none;">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" style="text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: var(--text-sm);">
                No hay reactivos registrados.
                <a href="{% url 'lab_inventory:reagent_create' %}" style="color: var(--color-primary-600); text-decoration: none;">Crear el primero</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
