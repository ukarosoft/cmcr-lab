<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th scope="col" class="th-base">Nombre</th>
            <th scope="col" class="th-base">Descripción</th>
            <th scope="col" class="th-base text-center">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for c in categories %}
        <tr>
            <td class="td-base" style="font-weight: 500;">{{ c.name }}</td>
            <td class="td-base" style="color: var(--text-secondary);">{{ c.description|truncatechars:60|default:'—' }}</td>
            <td class="td-base text-center">
                <a href="{% url 'lab_inventory:category_update' c.pk %}" class="btn-table btn-table-edit">Editar</a>
                <a href="{% url 'lab_inventory:category_delete' c.pk %}" class="btn-table btn-table-delete">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="td-base text-center" style="padding: 3rem;">No hay categorías.</td></tr>
        {% endfor %}
    </tbody>
</table>
