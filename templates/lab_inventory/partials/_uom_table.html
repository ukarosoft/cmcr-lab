<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th class="th-base">Nombre</th>
            <th class="th-base">Abreviatura</th>
            <th class="th-base text-center">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for u in uoms %}
        <tr>
            <td class="td-base" style="font-weight: 500;">{{ u.name }}</td>
            <td class="td-base" style="font-family: var(--font-mono); color: var(--text-secondary);">{{ u.abbreviation }}</td>
            <td class="td-base text-center">
                <a href="{% url 'lab_inventory:uom_update' u.pk %}" style="color: var(--color-primary-600); font-size: var(--text-xs); margin-right: 0.5rem; text-decoration: none;">Editar</a>
                <a href="{% url 'lab_inventory:uom_delete' u.pk %}" style="color: var(--color-danger); font-size: var(--text-xs); text-decoration: none;">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="td-base text-center" style="padding: 3rem;">No hay unidades.</td></tr>
        {% endfor %}
    </tbody>
</table>
