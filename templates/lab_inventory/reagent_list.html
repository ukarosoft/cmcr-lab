{% extends 'base.html' %}

{% block title %}Reactivos — CMCR Lab{% endblock %}

{% block content %}
<div class="flex">
    {% include 'components/_sidebar.html' %}

    <div class="flex-1 p-6 lg:p-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-title">Reactivos</h1>
                <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 0.25rem;">Catálogo de reactivos con recetas</p>
            </div>
            <a href="{% url 'lab_inventory:reagent_create' %}" class="btn-primary">+ Nuevo reactivo</a>
        </div>

        <div class="card mb-4">
            <input type="search" name="q" placeholder="Buscar reactivo..." class="input-base" style="max-width: 320px;"
                   hx-get="{% url 'lab_inventory:reagent_list' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#reagent-table">
        </div>

        <div id="reagent-table" class="card" style="padding: 0; overflow: hidden;">
            {% include 'lab_inventory/partials/_reagent_table.html' %}
        </div>
    </div>
</div>
{% endblock %}
