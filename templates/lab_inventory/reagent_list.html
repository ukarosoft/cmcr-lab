{% extends 'base.html' %}

{% block title %}Reactivos — CMCR Lab{% endblock %}

{% block content %}
<div style="display: flex;">
    {% include 'components/_sidebar.html' %}

    <div class="animate-in" style="flex: 1; min-width: 0; padding: var(--space-6) var(--space-8); max-width: 1400px;">
        <header class="page-header">
            <div>
                <h1 class="page-header__title">Reactivos</h1>
                <p class="page-header__subtitle">Catálogo de reactivos formulados con sus recetas</p>
            </div>
            <div class="page-header__actions">
                <a href="{% url 'lab_inventory:reagent_create' %}" class="btn-primary">
                    <svg class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    Nuevo reactivo
                </a>
            </div>
        </header>

        <div class="card-pro card-pro--flat" style="display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4); padding: var(--space-3) var(--space-4);">
            <div style="position: relative; flex: 1; max-width: 480px;">
                <svg style="position: absolute; left: .75rem; top: 50%; transform: translateY(-50%); width: 1rem; height: 1rem; color: var(--text-muted); pointer-events: none;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="search" name="q" placeholder="Buscar reactivo por nombre o código…"
                       hx-get="{% url 'lab_inventory:reagent_list' %}"
                       hx-trigger="keyup changed delay:300ms"
                       hx-target="#reagent-table"
                       class="input-pro" style="padding-left: 2.25rem;">
            </div>
        </div>

        <div id="reagent-table" class="table-wrap">
            {% include 'lab_inventory/partials/_reagent_table.html' %}
        </div>
    </div>
</div>
{% endblock %}
