{% extends 'base.html' %}

{% block title %}Proveedores — CMCR Lab{% endblock %}

{% block content %}
<div class="flex">
    {% include 'components/_sidebar.html' %}

    <div class="flex-1 p-6 lg:p-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-title">Proveedores</h1>
            <a href="{% url 'lab_inventory:supplier_create' %}" class="btn-primary">+ Nuevo</a>
        </div>

        <div class="card mb-4">
            <input type="search" name="q" placeholder="Buscar proveedor por nombre o RIF..." class="input-base" style="max-width: 340px;"
                   hx-get="{% url 'lab_inventory:supplier_list' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#supplier-table">
        </div>

        <div id="supplier-table" class="card" style="padding: 0; overflow: hidden;">
            {% include 'lab_inventory/partials/_supplier_table.html' %}
        </div>
    </div>
</div>
{% endblock %}
