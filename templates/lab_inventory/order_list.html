{% extends 'base.html' %}

{% block title %}Órdenes de Producción — CMCR Lab{% endblock %}

{% block content %}
<div class="flex">
    {% include 'components/_sidebar.html' %}

    <div class="flex-1 p-6 lg:p-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-title">Órdenes de producción</h1>
            <a href="{% url 'lab_inventory:order_create' %}" class="btn-primary">+ Nueva orden</a>
        </div>

        <div class="card mb-4" style="display: flex; gap: 1rem; align-items: center;">
            <select name="status" class="input-base" style="max-width: 200px;"
                    hx-get="{% url 'lab_inventory:order_list' %}"
                    hx-trigger="change"
                    hx-target="#order-table">
                <option value="">Todos los estados</option>
                <option value="planned">Planificada</option>
                <option value="in_progress">En proceso</option>
                <option value="completed">Completada</option>
                <option value="cancelled">Cancelada</option>
            </select>
        </div>

        <div id="order-table" class="card" style="padding: 0; overflow: hidden;">
            {% include 'lab_inventory/partials/_order_table.html' %}
        </div>
    </div>
</div>
{% endblock %}
