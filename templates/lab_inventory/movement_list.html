{% extends 'base.html' %}

{% block title %}Movimientos — CMCR Lab{% endblock %}

{% block content %}
<div class="flex">
    {% include 'components/_sidebar.html' %}

    <div class="flex-1 p-6 lg:p-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-title">Movimientos de stock</h1>
            <a href="{% url 'lab_inventory:movement_create' %}" class="btn-primary">+ Nuevo movimiento</a>
        </div>

        <div class="card mb-4" style="display: flex; gap: 1rem; align-items: center;">
            <input type="search" name="q" placeholder="Buscar..." class="input-base" style="max-width: 250px;"
                   hx-get="{% url 'lab_inventory:movement_list' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#movement-table">
            <select name="type" class="input-base" style="max-width: 200px;"
                    hx-get="{% url 'lab_inventory:movement_list' %}"
                    hx-trigger="change"
                    hx-target="#movement-table">
                <option value="">Todos los tipos</option>
                <option value="entry">Entrada</option>
                <option value="exit">Salida</option>
                <option value="adjustment">Ajuste</option>
            </select>
        </div>

        <div id="movement-table" class="card" style="padding: 0; overflow: hidden;">
            {% include 'lab_inventory/partials/_movement_table.html' %}
        </div>
    </div>
</div>
{% endblock %}
