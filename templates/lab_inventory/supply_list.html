{% extends 'base.html' %}

{% block title %}Insumos — CMCR Lab{% endblock %}

{% block content %}
<div class="flex">
    {% include 'components/_sidebar.html' %}

    <div class="flex-1 p-6 lg:p-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-title">Insumos</h1>
                <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 0.25rem;">Gestión de insumos de laboratorio</p>
            </div>
            <a href="{% url 'lab_inventory:supply_create' %}" class="btn-primary">
                + Nuevo insumo
            </a>
        </div>

        <div class="card mb-4">
            <input type="search" name="q" placeholder="Buscar insumo por nombre o código..."
                   hx-get="{% url 'lab_inventory:supply_list' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#supply-table"
                   hx-indicator="#spinner"
                   class="input-base" style="max-width: 420px;">
            <span id="spinner" class="htmx-indicator" style="color: var(--text-muted); font-size: var(--text-xs); margin-left: 0.5rem;">Buscando...</span>
        </div>

        <div id="supply-table" class="card" style="padding: 0; overflow: hidden;">
            {% include 'lab_inventory/partials/_supply_table.html' %}
        </div>
    </div>
</div>
{% endblock %}
