{% extends 'base.html' %}
{% block title %}Cuenta suspendida — Ukaro{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center">
        <div class="mb-6">
            <svg class="mx-auto h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                 style="color: var(--color-danger, #DC2626);" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-3" style="color: var(--color-danger, #DC2626);">
            Cuenta suspendida
        </h1>
        <p class="mb-2" style="color: var(--text-secondary, #64748B);">
            La cuenta de tu organización está temporalmente suspendida.
        </p>
        <p class="text-sm mb-6" style="color: var(--text-muted, #94A3B8);">
            Contacta a soporte para reactivarla.
        </p>
        <a href="mailto:soporte@ukarasoft.com"
           class="inline-block px-6 py-3 rounded-lg font-semibold text-white transition-colors"
           style="background-color: var(--color-primary-600, #1E7FC8);">
            Contactar soporte
        </a>
    </div>
</div>
{% endblock %}
