{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión expirada — {% block site_name %}Ukaro{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/ukaro.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--surface-body-light);
            font-family: var(--font-body);
        }
        .card {
            max-width: 440px;
            width: 100%;
            padding: 2.5rem;
            background: var(--surface-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⏱️</div>
        <h1 class="text-title" style="font-size: 1.5rem; margin-bottom: 0.75rem;">
            Tu sesión expiró
        </h1>
        <p class="text-muted" style="margin-bottom: 1.5rem;">
            Por seguridad, el formulario ya no es válido.
            Por favor vuelve atrás y envíalo de nuevo.
        </p>
        <a href="/" class="btn-primary">
            ← Volver al inicio
        </a>
    </div>
</body>
</html>
