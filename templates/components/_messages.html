{% if messages %}
<div class="fixed top-4 right-4 z-50 flex flex-col gap-2" id="messages-container">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" x-transition
         class="px-4 py-3 rounded-lg shadow-md text-sm font-medium flex items-center gap-2
         {% if message.tags == 'success' %}badge-success
         {% elif message.tags == 'error' %}badge-error
         {% elif message.tags == 'warning' %}badge-warning
         {% else %}badge-info{% endif %}"
         style="min-width: 280px;">
        <span>{{ message }}</span>
        <button type="button" @click="show = false"
                class="ml-auto opacity-60 hover:opacity-100"
                aria-label="Cerrar mensaje">
            <span aria-hidden="true">&#x2715;</span>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
