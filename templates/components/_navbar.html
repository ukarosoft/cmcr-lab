{% load static %}
<nav class="navbar px-4 py-3 flex items-center justify-between shadow-md"
     x-data="{ dark: localStorage.getItem('theme') === 'dark' }"
     x-init="dark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark')">

    <div class="flex items-center gap-3">
        <div class="navbar-icon-box">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
        </div>
        <span class="navbar-brand">CMCR Lab</span>
        <span class="navbar-subtitle">Centro Clínico Madre Carmen Rendiles</span>
    </div>

    <div class="flex items-center gap-4">
        {% if request.tenant %}
        <span class="text-sm navbar-text-muted">
            {{ request.tenant.name }}
        </span>
        {% endif %}

        <span class="text-sm navbar-text">
            {{ request.user.get_full_name|default:request.user.username }}
        </span>

        <button
            @click="
                dark = !dark;
                dark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', dark ? 'dark' : 'light');
            "
            class="navbar-btn"
            :aria-label="dark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
            :title="dark ? 'Modo claro' : 'Modo oscuro'">
            <svg x-show="dark" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z"/>
            </svg>
            <svg x-show="!dark" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
        </button>

        <a href="{% url 'core:logout' %}" class="navbar-logout" aria-label="Cerrar sesión">
            Salir
        </a>
    </div>
</nav>
