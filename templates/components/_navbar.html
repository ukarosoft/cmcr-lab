{% load static %}
<nav class="navbar-pro" aria-label="Barra superior"
     x-data="{ dark: false, menuOpen: false }"
     x-init="dark = document.documentElement.classList.contains('dark')">

    <!-- Marca -->
    <div class="navbar-pro__brand">
        <div class="navbar-pro__icon-box">
            <svg style="width: 1.125rem; height: 1.125rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
        </div>
        <div>
            <div class="navbar-pro__brand-name">CMCR Lab</div>
            <div class="navbar-pro__brand-sub">Centro Clínico Madre Carmen Rendiles</div>
        </div>
    </div>

    <!-- Acciones derecha -->
    <div class="navbar-pro__actions">
        {% if request.tenant %}
        <span class="navbar-pro__chip" title="Organización activa">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            {{ request.tenant.name|truncatechars:24 }}
        </span>
        {% endif %}

        <!-- Notificaciones (placeholder con badge si hay no leídas) -->
        <a href="{% url 'lab_inventory:dashboard' %}" class="navbar-pro__icon-btn navbar-pro__icon-btn--badge"
           title="Notificaciones" aria-label="Notificaciones (1 nueva)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
        </a>

        <!-- Toggle dark mode -->
        <button type="button"
                @click="
                    dark = !dark;
                    dark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                "
                class="navbar-pro__icon-btn"
                :aria-label="dark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
                :title="dark ? 'Modo claro' : 'Modo oscuro'">
            <svg x-show="dark" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z"/>
            </svg>
            <svg x-show="!dark" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
        </button>

        <!-- Avatar usuario + menú -->
        <div style="position: relative;" @click.outside="menuOpen = false">
            <button type="button" @click="menuOpen = !menuOpen" class="navbar-pro__avatar"
                    :aria-expanded="menuOpen.toString()"
                    aria-haspopup="menu"
                    aria-label="Menú de usuario">
                {{ request.user.get_full_name|default:request.user.username|first|upper }}
            </button>
            <div x-show="menuOpen" x-cloak x-transition.opacity
                 role="menu"
                 style="position: absolute; right: 0; top: calc(100% + .5rem); min-width: 220px;
                        background: var(--surface-card); color: var(--text-primary);
                        border-radius: var(--radius-lg); box-shadow: var(--elevation-3);
                        border: 1px solid var(--border-default); padding: var(--space-2);
                        z-index: 60;">
                <div style="padding: var(--space-3); border-bottom: 1px solid var(--border-muted); margin-bottom: var(--space-1);">
                    <div style="font-size: var(--text-sm); font-weight: 600; color: var(--text-primary);">
                        {{ request.user.get_full_name|default:request.user.username }}
                    </div>
                    <div style="font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px;">
                        {{ request.user.get_role_display }}
                    </div>
                </div>
                <a href="{% url 'core:logout' %}" role="menuitem" class="menu-item">
                    <svg class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Cerrar sesión
                </a>
            </div>
        </div>
    </div>
</nav>
