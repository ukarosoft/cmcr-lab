{% load static %}
<aside class="sidebar-pro" aria-label="Navegación principal">

    <!-- Marca compacta dentro del sidebar -->
    <div class="sidebar-pro__brand">
        <div class="sidebar-pro__brand-icon">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
        </div>
        <div>
            <div class="sidebar-pro__brand-name">CMCR Lab</div>
            <div class="sidebar-pro__brand-org">Inventario · Producción</div>
        </div>
    </div>

    <nav style="display: flex; flex-direction: column; gap: 2px;" aria-label="Secciones">
        <a href="{% url 'lab_inventory:dashboard' %}"
           class="sidebar-pro__link {% if request.resolver_match.url_name == 'dashboard' %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            Dashboard
        </a>

        <div class="sidebar-pro__section-label">Operación</div>

        <a href="{% url 'lab_inventory:supply_list' %}"
           class="sidebar-pro__link {% if 'supply' in request.resolver_match.url_name %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            Insumos
        </a>

        <a href="{% url 'lab_inventory:reagent_list' %}"
           class="sidebar-pro__link {% if 'reagent' in request.resolver_match.url_name %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
            Reactivos
        </a>

        <a href="{% url 'lab_inventory:order_list' %}"
           class="sidebar-pro__link {% if 'order' in request.resolver_match.url_name %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
            </svg>
            Órdenes de producción
        </a>

        <a href="{% url 'lab_inventory:movement_list' %}"
           class="sidebar-pro__link {% if 'movement' in request.resolver_match.url_name %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
            </svg>
            Movimientos
        </a>

        <div class="sidebar-pro__section-label">Catálogos</div>

        <a href="{% url 'lab_inventory:supplier_list' %}"
           class="sidebar-pro__link {% if 'supplier' in request.resolver_match.url_name %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            Proveedores
        </a>

        <a href="{% url 'lab_inventory:category_list' %}"
           class="sidebar-pro__link {% if 'category' in request.resolver_match.url_name %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
            </svg>
            Categorías
        </a>

        <a href="{% url 'lab_inventory:uom_list' %}"
           class="sidebar-pro__link {% if 'uom' in request.resolver_match.url_name %}sidebar-pro__link--active{% endif %}">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
            </svg>
            Unidades
        </a>
    </nav>

    <div class="sidebar-pro__footer">
        v1.0.0 · {{ request.tenant.name|default:"Sistema"|truncatechars:20 }}
        <br>
        <span style="color: rgba(255,255,255,.55);">© {% now "Y" %} SmartSolutions</span>
    </div>
</aside>
