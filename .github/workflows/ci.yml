name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Instalar dependencias de lint
        run: pip install ruff

      - name: Ruff check
        run: ruff check apps/ config/

      - name: Ruff format check
        run: ruff format --check apps/ config/

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-key-not-for-production
      DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb
      DJANGO_SETTINGS_MODULE: config.settings.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements/dev.txt

      - name: Verificar sistema Django
        run: python manage.py check

      - name: Aplicar migraciones
        run: python manage.py migrate --noinput

      - name: Ejecutar tests con cobertura
        run: pytest --cov=apps --cov-report=term-missing --tb=short

      - name: Verificar cobertura mínima
        run: pytest --cov=apps --cov-fail-under=0
        # Subir a 60 cuando haya tests escritos
